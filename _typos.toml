[default.extend-words]
# moto test function name: test_get_nonexistant_parameter
nonexistant = "nonexistant"
# UUID-like example tokens in spec files (e.g., "fedc-ba987SECRET1")
ba = "ba"
# HashiCorp is a company name
Hashi = "Hashi"
# CloudFront Field-Level Encryption abbreviation and local variable names.
FLE = "FLE"
fle = "fle"
fo = "fo"

[files]
extend-exclude = ["CHANGELOG.md", "notebooks/*", "vendors/*", "codegen/smithy-model/*"]
